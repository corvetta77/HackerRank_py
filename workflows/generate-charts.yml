name: Generate Biofeedback Charts

on:
  push:
    paths:
      - 'generate_biofeedback_charts.py'
  workflow_dispatch:

jobs:
  generate-charts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install matplotlib
    
    - name: Generate charts
      run: python generate_biofeedback_charts.py
    
    - name: Upload charts as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: biofeedback-charts
        path: brainwave_*.png
        retention-days: 90
    
    - name: Commit and push charts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add brainwave_*.png 2>/dev/null || true
        git commit -m "Generate biofeedback charts" 2>/dev/null || true
        git push 2>/dev/null || true
